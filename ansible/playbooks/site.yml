- name: Common bootstrap — all nodes
  hosts: all
  gather_facts: true
  become: yes
  tags: [common]
  roles:
    - common

- name: Edge node setup
  hosts: edge
  become: yes
  tags: [edge]
  roles:
    - k3s
    - traefik
    - postgres
    - go-api

- name: Worker node setup
  hosts: worker
  become: yes
  tags: [worker]
  roles:
    - k3s
    - runtime-agent

- name: Infra node setup
  hosts: infra
  become: yes
  tags: [infra]
  roles:
    - gitea
    - docker-registry
    - victoriametrics
    - uptime-kuma
