- name: Create Vaultwarden directories
  ansible.builtin.file:
    path: "{{ platform_dir }}/vaultwarden/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - data

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ platform_dir }}/vaultwarden/docker-compose.yml"
    mode: "0644"

- name: Start Vaultwarden
  ansible.builtin.shell: |
    docker compose pull && docker compose up -d
  args:
    chdir: "{{ platform_dir }}/vaultwarden"
  register: vw_start
  retries: 3
  delay: 15
  until: vw_start is succeeded
