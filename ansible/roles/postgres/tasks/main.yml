- name: Create PostgreSQL directories
  ansible.builtin.file:
    path: "{{ platform_dir }}/postgres/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - data
    - init

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ platform_dir }}/postgres/docker-compose.yml"
    mode: "0644"

- name: Start PostgreSQL
  ansible.builtin.shell: |
    docker compose up -d
  args:
    chdir: "{{ platform_dir }}/postgres"
  register: pg_start
  changed_when: "'Started' in pg_start.stdout or 'Creating' in pg_start.stdout or 'Starting' in pg_start.stdout"
