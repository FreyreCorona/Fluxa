- name: Create VictoriaMetrics directories
  ansible.builtin.file:
    path: "{{ platform_dir }}/monitoring/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - victoria-metrics-data
    - prometheus-data

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ platform_dir }}/monitoring/docker-compose.yml"
    mode: "0644"

- name: Start monitoring stack
  ansible.builtin.shell: |
    docker compose up -d
  args:
    chdir: "{{ platform_dir }}/monitoring"
  register: monitoring_start
  changed_when: "'Started' in monitoring_start.stdout or 'Creating' in monitoring_start.stdout or 'Starting' in monitoring_start.stdout"
