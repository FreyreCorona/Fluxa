- name: Install k3s server
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | sh -s - server \
      --disable traefik \
      --write-kubeconfig-mode 644
  args:
    creates: /usr/local/bin/k3s
  when: k3s_role == 'server'

- name: Read node token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw
  when: k3s_role == 'server'

- name: Store token as fact
  ansible.builtin.set_fact:
    k3s_token: "{{ k3s_token_raw.content | b64decode | trim | split(':') | last }}"
  when: k3s_role == 'server'

- name: Install k3s agent
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars[groups['edge'][0]]['k3s_server_ip'] }}:6443 K3S_TOKEN={{ hostvars[groups['edge'][0]]['k3s_token'] }} sh -
  args:
    creates: /usr/local/bin/k3s
  when: k3s_role == 'agent'
