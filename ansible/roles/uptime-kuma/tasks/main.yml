- name: Create Uptime Kuma directory
  ansible.builtin.file:
    path: "{{ platform_dir }}/monitoring/uptime-kuma"
    state: directory
    mode: "0755"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ platform_dir }}/monitoring/uptime-kuma/docker-compose.yml"
    mode: "0644"

- name: Start Uptime Kuma
  ansible.builtin.shell: |
    docker compose up -d
  args:
    chdir: "{{ platform_dir }}/monitoring/uptime-kuma"
  register: kuma_start
  changed_when: "'Started' in kuma_start.stdout or 'Creating' in kuma_start.stdout or 'Starting' in kuma_start.stdout"
