name: operator

on:
  push:
    branches: [master]
    paths:
      - operator/**
      - .github/workflows/operator.yml
  pull_request:
    branches: [master]
    paths:
      - operator/**
      - .github/workflows/operator.yml

defaults:
  run:
    working-directory: operator

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: operator/go.sum
      - run: go build ./...
      - run: go vet ./...

  docker:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: operator
          push: true
          tags: |
            ghcr.io/freyrecorona/fluxa/operator:latest
            ghcr.io/freyrecorona/fluxa/operator:${{ github.sha }}
